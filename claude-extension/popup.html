<!DOCTYPE html>
<html>
<head>
  <style>
    body {
      width: 300px;
      padding: 10px;
      font-family: system-ui, -apple-system, sans-serif;
    }
    .status {
      padding: 10px;
      border-radius: 5px;
      margin-bottom: 10px;
    }
    .connected {
      background-color: #d4edda;
      color: #155724;
    }
    .disconnected {
      background-color: #f8d7da;
      color: #721c24;
    }
  </style>
</head>
<body>
  <h2>Claude AshAI Bridge</h2>
  <div id="status" class="status disconnected">
    Connecting...
  </div>
  <p>This extension bridges Claude.ai with your local AshAI system.</p>
  <p>Make sure you're logged into Claude.ai and the WebSocket server is running on port 8082.</p>
  <script src="popup.js"></script>
</body>
</html>
