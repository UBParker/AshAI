# AshAI Docker Compose — Multi-provider proxy + Claude CLI agent containers
#
# Usage:
#   cp .env.example .env          # fill in your API keys
#   docker compose up -d
#
# The claude-cli service exposes:
#   port 8081 — Claude Terminal Controller (chat API)
#   port 8082 — Multi-Provider API Proxy
#   port 2222 — SSH (optional debug access)
#
# Proxy route map (all on port 8082):
#   /anthropic/* → https://api.anthropic.com          (ANTHROPIC_API_KEY)
#   /openai/*    → https://api.openai.com/v1           (OPENAI_API_KEY)
#   /gemini/*    → https://generativelanguage.googleapis.com  (GEMINI_API_KEY)
#   /ollama/*    → OLLAMA_BASE_URL (default host.docker.internal:11434)
#   /custom/X/*  → CUSTOM_X_URL   (CUSTOM_X_API_KEY optional)
#   /*           → api.anthropic.com  (backwards-compat legacy route)

services:
  # ── Multi-provider Claude CLI agent ──────────────────────────────────────
  claude-cli:
    build:
      context: .
      dockerfile: Dockerfile.consolidated-claude-cli
    image: ashai-claude-cli:latest
    container_name: ashai-claude-cli
    ports:
      - "8081:8081"   # Claude Terminal Controller
      - "8082:8082"   # Multi-Provider API Proxy
      - "2222:22"     # SSH (optional)
    environment:
      # ── Anthropic ─────────────────────────────────────────────────────────
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      # Override default upstream (useful for testing or alternative endpoints)
      ANTHROPIC_BASE_URL: ${ANTHROPIC_BASE_URL:-https://api.anthropic.com}

      # ── OpenAI ────────────────────────────────────────────────────────────
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_BASE_URL: ${OPENAI_BASE_URL:-https://api.openai.com/v1}

      # ── Google Gemini ─────────────────────────────────────────────────────
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      GEMINI_BASE_URL: ${GEMINI_BASE_URL:-https://generativelanguage.googleapis.com}

      # ── Ollama (local, no auth needed) ────────────────────────────────────
      # host.docker.internal resolves to the Docker host on Mac/Windows.
      # On Linux you may need: extra_hosts: host.docker.internal:host-gateway
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://host.docker.internal:11434}

      # ── Custom providers (repeat pattern for more) ────────────────────────
      # CUSTOM_MISTRAL_URL: https://api.mistral.ai/v1
      # CUSTOM_MISTRAL_API_KEY: ${MISTRAL_API_KEY:-}
      # CUSTOM_GROQ_URL: https://api.groq.com/openai/v1
      # CUSTOM_GROQ_API_KEY: ${GROQ_API_KEY:-}
      # CUSTOM_TOGETHER_URL: https://api.together.xyz/v1
      # CUSTOM_TOGETHER_API_KEY: ${TOGETHER_API_KEY:-}

      # ── Proxy port (internal, change only if 8082 conflicts) ─────────────
      PROXY_PORT: "8082"

    volumes:
      # Workspace — shared with host for tool access and signal files
      - ./:/app/workspace:rw
      # Optional: mount Claude auth for subscription-based usage
      # - ~/.claude-auth.json:/tmp/claude-auth.json:ro
      # Optional: SSH keys for git access inside container
      # - ~/.ssh:/home/claude/.ssh:ro

    extra_hosts:
      # Allow container to reach Ollama on the Docker host (Linux only)
      - "host.docker.internal:host-gateway"

    restart: unless-stopped

    healthcheck:
      test: >
        curl -f http://localhost:8081/api/status 2>/dev/null ||
        curl -f http://localhost:8082/health 2>/dev/null ||
        exit 1
      interval: 30s
      timeout: 5s
      start_period: 15s
      retries: 3

    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 2G
        reservations:
          cpus: "0.25"
          memory: 256M

  # ── Optional: AshAI Gateway (orchestrator + frontend) ────────────────────
  # Uncomment to run the full AshAI stack alongside the CLI agent.
  #
  # ashai-gateway:
  #   build:
  #     context: .
  #     dockerfile: Dockerfile.consolidated-gateway
  #     args:
  #       VITE_SUPABASE_URL: ${VITE_SUPABASE_URL:-}
  #       VITE_SUPABASE_ANON_KEY: ${VITE_SUPABASE_ANON_KEY:-}
  #   ports:
  #     - "9000:9000"
  #   environment:
  #     SUPABASE_URL: ${SUPABASE_URL:-}
  #     SUPABASE_SERVICE_KEY: ${SUPABASE_SERVICE_KEY:-}
  #     GATEWAY_PORT: "9000"
  #     HELPERAI_DEFAULT_PROVIDER: anthropic
  #     # Point provider base URLs at the claude-cli proxy container
  #     HELPERAI_ANTHROPIC_BASE_URL: http://claude-cli:8082/anthropic
  #     HELPERAI_OPENAI_BASE_URL: http://claude-cli:8082/openai
  #     HELPERAI_GEMINI_BASE_URL: http://claude-cli:8082/gemini
  #   volumes:
  #     - ./data:/data
  #   depends_on:
  #     claude-cli:
  #       condition: service_healthy
  #   networks:
  #     - ashai-network
  #   restart: unless-stopped

networks:
  default:
    name: ashai-network
    driver: bridge
