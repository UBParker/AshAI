app = 'ashai-gateway'
primary_region = 'iad'

[build]
  dockerfile = 'Dockerfile'

  [build.args]
    VITE_SUPABASE_URL = 'https://mjosrqijnvjtkywadbxm.supabase.co'
    VITE_SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1qb3NycWlqbnZqdGt5d2FkYnhtIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzE2MzYyNjEsImV4cCI6MjA4NzIxMjI2MX0.N6j-2ND2XS8w5l_cXbabXTX26KMI4So7q1UAIHz-Ko4'

[env]
  GATEWAY_DATA_DIR = '/data'
  GATEWAY_PORT = '9000'
  PYTHONUNBUFFERED = '1'

[[mounts]]
  source = 'ashai_data'
  destination = '/data'

[[services]]
  protocol = 'tcp'
  internal_port = 9000
  auto_stop_machines = 'off'
  auto_start_machines = true
  min_machines_running = 1

  [[services.ports]]
    port = 443
    handlers = ['tls', 'http']

  [[services.ports]]
    port = 80
    handlers = ['http']

  [services.concurrency]
    type = 'connections'
    hard_limit = 100
    soft_limit = 80

  [[services.http_checks]]
    interval = '30s'
    timeout = '5s'
    grace_period = '10s'
    method = 'get'
    path = '/gateway/health'
    protocol = 'http'

[[vm]]
  size = 'shared-cpu-2x'
  memory = '1024mb'
